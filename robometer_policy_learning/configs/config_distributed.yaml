defaults:
  - _self_
  - config

mode: learner  # Mode: learner, rollout, or eval

wandb_name: "train_distributed"  # Override wandb name for distributed training

# Distributed reward relabeling configuration
distributed_reward_relabel:
  enabled: true  # Enable distributed reward relabeling (requires reward relabeling server to be running)
  server_address: "localhost:50052"  # Address of reward relabeling server (host:port)
  max_queue_size: 100  # Maximum pending trajectories in queue
  timeout: 60.0  # RPC timeout in seconds (longer for full trajectories)
  flush_interval: 0.1  # Background thread processing interval in seconds

# Distributed training configuration
distributed:
  # Learner server configuration
  learner_server:
    host: "127.0.0.1"
    port: 50051
    address: "127.0.0.1:50051"  # Full address (host:port)
    max_msg_mb: 256  # Maximum message size in MB
    relabel_mode: "pre"  # Reward relabeling mode (pre/post)
  
  # Training loop configuration
  train_target_hz: 0.0  # Target training frequency in Hz (0.0 = no limit)
  log_interval: 5  # Logging interval in seconds
  save_interval: null  # Save interval in steps (null = use top-level save_interval)
  actor_update_freq: 50  # Frequency of actor weight updates to server (in steps)
  
  # Rollout worker configuration
  rollout:
    flush_every: 32  # Flush buffer every N transitions
    max_message_mb: 64  # Maximum message size in MB for streaming
    refresh_secs: 5  # How often to refresh actor weights (in seconds)
    target_hz: 0.0  # Target rollout frequency in Hz (0.0 = no limit)
    num_rollouts: 100  # Number of rollouts per cycle
  
  # Evaluation worker configuration
  eval:
    eval_every: 60  # Evaluation frequency in seconds

