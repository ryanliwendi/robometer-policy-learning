#@package _global_
defaults:
  - _self_
  - base

# Transformer Value Function Configuration
transformer:
  d_model: 256
  nhead: 8
  num_encoder_layers: 4
  transformer_dropout: 0.0
  transformer_activation: gelu
  feature_hidden_dims: [768, 512]
  output_hidden_dims: null
  pooling_strategy: first
  use_layer_norm: true
  activation: relu
  dropout_rate: 0.0

