#@package _global_
defaults:
  - _self_
  - base

# RNN Value Function Configuration
rnn:
  rnn_type: LSTM
  rnn_hidden_size: 256
  rnn_num_layers: 1
  rnn_dropout: 0.0
  rnn_bidirectional: false
  feature_hidden_dims: [768, 256]
  output_hidden_dims: null
  activation: relu
  use_layer_norm: false
  dropout_rate: 0.0

