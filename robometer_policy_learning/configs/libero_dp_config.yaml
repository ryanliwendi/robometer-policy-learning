defaults:
  - algorithm@offline_algorithm: dp
  - reward_model: null
  - policy@policy: mlp  # ignored by DP (it builds DiffusionActor internally), required by schema

# Debug mode
debug: false

# Environment configuration
env:
  env_name: "libero_10"
  task_id: 3
  max_episode_steps: 800
  use_full_state: false
  use_gt_rewards: true
  h5_dataset_path: "/scr/liryan/LIBERO/libero/datasets/libero_10_only_successful/KITCHEN_SCENE4_put_the_black_bowl_in_the_bottom_drawer_of_the_cabinet_and_close_it_demo.hdf5"
  dino_image_keys: ["agentview_rgb"]
  extra_keys_to_drop: ["eye_in_hand_rgb", "prompt", "language", "observation/image", "observation/wrist_image"]
  success_bonus_amount: 0.0

# Training configuration
training:
  num_envs: 1
  chunk_size: 16  # Diffusion prediction horizon (Tp)
  n_action_steps: 4  # Actions executed open-loop per chunk before replanning (Ta)
  use_rnn: false
  num_offline_steps: 50_000
  load_dir: null
  save_interval: 10000
  continue_training: false
  seed: 0
  normalize_lowdim_obs: true  # Z-score low-dim obs using dataset stats (important for DP)

# Replay buffer configuration
buffer:
  capacity: 500_000
  sample_ratio: 0.5
  use_success_fail_buffer: false
  success_fail_sample_ratio: 0.5
  success_detection_duration: 2
  success_detection_threshold: 0.65
  distributed_reward_relabel:
    enabled: false
    server_address: "localhost:50052"
    max_queue_size: 100
    timeout: 60.0
    flush_interval: 0.1

# Logging configuration
logging:
  wandb_project: libero_dp
  wandb_entity: liryan-usc
  wandb_offline: false
  wandb_log_dir_base: logs/wandb
  wandb_name: "train_dp"
  log_level: "INFO"

# Algorithm configuration
alg:
  offline_alg_name: dp
  online_alg_name: null

# Evaluation configuration
eval:
  eval_freq: 10000
  eval_num_episodes: 25
  eval_record_video: true
  eval_on_first_step: false

# Model configuration
model:
  dinov2_model: "facebook/dinov2-base"
  sentence_model: null
