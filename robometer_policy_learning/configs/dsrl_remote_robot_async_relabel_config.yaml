defaults:
  - dsrl_droid_config
  - override algorithm@online_algorithm: franka_dsrl_sac
  - override policy@policy: transformer
  - override value_function@value_function: transformer
  - _self_
  
# Environment configuration
env:
  # Async reward relabeling configuration
  use_async_reward_relabel: true
  reward_relabel_batch_size: 1

# Replay buffer configuration
buffer:
  min_relabeled_ratio: 0.1  # Minimum ratio of relabeled transitions required before sampling
  save_buffer_on_exit: true  # Save buffer to npz file when training exits or killed (Ctrl+C)
  save_buffer_every: 500  # Save buffer every N env steps (0 to disable)
  save_buffer_dir: "replay_buffers"  # Directory to save buffer files
  save_buffer_images: true   # WARNING: creates large files! Only enable if you need videos
  save_buffer_image_keys: ["observation/wrist_image_left", "observation/exterior_image_1_left"]  # Which image keys to save

reward_model:
  async_reward_relabel_server_address: "localhost:50052"
  success_detection_duration: 1
  success_detection_threshold: 1.0

# Logging configuration
logging:
  wandb_name: train_dsrl_droid_async_relabel

model:
  # dinov2_model: null #"facebook/dinov2-small"
  dinov2_model: "facebook/dinov2-small"
  sentence_model: null
  # image_encoder_type: "impala"

# turn off eval for async buffer
eval:
  eval_freq: 1000000000000000 # Evaluation frequency in rollouts 
  eval_num_episodes: 4  # Number of episodes for evaluation
  eval_record_video: true  # Whether to record videos during evaluation
  eval_at_episode_boundary: true  # If true, only evaluate at episode boundaries (auto-enabled for REMOTE_ROBOT)
  eval_on_first_step: false # If true, evaluate on the first step before any training