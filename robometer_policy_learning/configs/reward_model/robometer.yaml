# Model type: "robometer" or "roboreward"
model_type: "robometer"

# Model path to load training config from
# If None, will connect to eval_server instead of loading locally
# model_path: "rewardfm/rewind-base-oxe-mw-eval-jaco-success" 
model_path: "rewardfm/ant-rfm-rewind-bs1024-oxe-mw-prog-mw-0.1"

# Success detection related
use_success_detection: false
success_detection_duration: 1
success_detection_threshold: 0.65

# Whether to use relative rewards (r = r_t - r_t-1)
# This is an extension to EvalServerConfig
use_relative_rewards: false

# Whether to add estimated reward to the ground truth reward
add_estimated_reward: false

# Eval server settings (used when model_path is None)
eval_server_url: "http://localhost"  # Evaluation server URL
eval_server_port: 8000  # Evaluation server port
eval_server_timeout: 120.0  # Timeout for eval server requests

# GPU Pool settings (only used when loading model locally)
num_gpus: 1  # Number of GPUs to use
max_workers: 1  # Max worker threads

# Evaluation parameters (only used when loading model locally)
batch_size: 4  # Batch size for evaluation
