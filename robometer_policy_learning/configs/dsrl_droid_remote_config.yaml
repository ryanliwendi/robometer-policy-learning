# DSRL on a remote DROID-format robot (TCP server), e.g. droid_remote_server.py
defaults:
  - algorithm@offline_algorithm: null # not used in simpler
  - algorithm@online_algorithm: droid_dsrl_sac
  - reward_model: null #robometer
  - policy@policy: transformer # Options: mlp, rnn, transformer
  - value_function@value_function: transformer # Options: mlp, rnn, transformer

# Debug mode
debug: false

# Environment configuration
env:
  env_name: "REMOTE_ROBOT"  # LIBERO task suite name, specific to LIBERO
  use_gt_rewards: false  # Use ground truth rewards (default: False). If True, no reward relabeling will be performed. If no reward model is provided, this will be set to True.
  image_keys: ["observation/wrist_image_left", "observation/exterior_image_1_left"] # keys for dino conversion in DSRL observation
  extra_keys_to_drop: ["observation/joint_position", "observation/gripper_position"] # keys to drop from observation beyond dino_image_keys (default: [])
  obs_format: "droid" # "droid" or "widowx"
  use_vlm_features: true # VLM features may add confusion to the policy if they're not that distinguishable

# Training configuration
training:
  num_envs: 1  # Number of parallel environments
  num_rollouts: 20_000  # Number of rollouts to train, this is more like env steps
  chunk_size: null # Action chunking size, should be null for MLP or match the action_exec_len of pi0
  use_rnn: false  # Use RNN actor and critic
  seed: 0  # Random seed
  num_offline_steps: 0 # Number of offline training steps
  load_dir: null  # Directory to load RL models from (null for no loading)
  save_interval: 10000  # Save interval in steps
  continue_training: false  # Continue training from the last checkpoint

# Replay buffer configuration
buffer:
  capacity: 20_000  # Replay buffer capacity
  sample_ratio: 0.0  # Sample ratio of offline buffer in mixed replay buffer (used only when we do offline-to-online RL)
  use_success_fail_buffer: false  # If True, create SuccessFailureReplayBuffer
  success_fail_sample_ratio: 0.5  # Ratio for sampling from success vs failure buffer
  distributed_reward_relabel:
    enabled: false  # Whether to use distributed reward relabeling
    server_address: "localhost:50052"  # Address for remote reward relabeling server
    max_queue_size: 100  # Max queue size for reward relabeling client
    timeout: 60.0  # Timeout for reward relabeling client
    flush_interval: 0.1  # Flush interval for reward relabeling client

# Logging configuration
logging:
  wandb_project: rfm_rl
  wandb_entity: clvr
  wandb_offline: false
  wandb_prefix: offline_only
  wandb_name: train_dsrl_droid_remote
  wandb_log_dir_base: logs/wandb
  log_level: "INFO"

# Algorithm configuration
alg:
  offline_alg_name: null # Offline algorithm name (iql, bc, sac)
  online_alg_name: sac  # Online algorithm name (sac, iql, bc)

# Evaluation configuration
eval:
  eval_freq: 1_000   # Evaluation frequency in rollouts 
  eval_num_episodes: 5 # Number of episodes for evaluation
  eval_record_video: true  # Whether to record videos during evaluation
  eval_at_episode_boundary: true  # If true, only evaluate at episode boundaries (auto-enabled for REMOTE_ROBOT)
  eval_on_first_step: true  # If true, evaluate on the first step before any training

# Model configuration
model:
  dinov2_model: null #"facebook/dinov2-small"
  sentence_model: null
  image_encoder_type: "impala"


# Remote Robot Configuration (used when env_name="REMOTE_ROBOT")
# Works with ngrok/Pinggy tunnels for training on different machines
remote_robot:
  host:  "0.0.0.0" # Robot server hostname (e.g., "0.tcp.ngrok.io", "xyz.a.pinggy.io")
  port: 6000 # Robot server port
  connect_timeout: 300.0  # Connection timeout in seconds (5 min default for remote)

# DSRL related parameters
dsrl:
  # Pi0 Configuration
  pi0_checkpoint: "gs://openpi-assets-simeval/pi05_droid_jointpos" # Path to Pi0 checkpoint (REQUIRED)
  #pi0_checkpoint: ./pi0_bridge/pi0_bridge/pi0_bridge_fft/30000 # Path to Pi0 checkpoint (REQUIRED)
  action_exec_len: 10 # How many actions to execute from chunk
  noise_dim: 32  # Dimension of noise to predict
  noise_action_bound: 1.0 # Action bound for noise