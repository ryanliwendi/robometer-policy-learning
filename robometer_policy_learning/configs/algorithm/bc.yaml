# Basic BC parameters
learning_starts: 100
batch_size: 256

# Training configuration
num_updates_per_train_step: 1

# Optimizer configurations
actor_optimizer_lr: 3.0e-5
actor_optimizer_eps: 1.0e-8
actor_optimizer_weight_decay: 0.0

# BC-specific parameters
# Changed to MSE because NLL causes MSE loss to explode
loss_type: "mse"  # ["mse", "nll", "huber", "smooth_l1"] - MSE for deterministic, NLL for stochastic
l2_regularization: 0.0  # L2 regularization weight

# Anti-overfitting regularization parameters
obs_noise_std: 0.0  # Standard deviation of noise added to observations
action_noise_std: 0.0  # Standard deviation of noise added to expert actions
gradient_penalty_weight: 0.0  # Weight for gradient penalty regularization
consistency_weight: 0.0  # Weight for consistency regularization

